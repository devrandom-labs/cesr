# release-plz — automated versioning, crates.io publish, and GitHub releases.
#
# Modeled on nexus, adapted for cesr: a SINGLE crate (no workspace-hack, so none
# of nexus's hakari/allow_dirty machinery). Published to crates.io as `cesr-rs`
# (the bare `cesr` name is squatted). On push to main, release-plz cuts the
# version, changelog, git tag, GitHub release, AND the crates.io publish, using
# the CARGO_REGISTRY_TOKEN repo secret (same model as nexus).
[workspace]
git_release_enable = true
git_tag_enable = true

[[package]]
name = "cesr-rs"

[[package]]
name = "keri-rs"
