# typos spell-checker config. The test-vector files are opaque base64/CESR
# encodings — random-looking substrings trip the dictionary with no signal — so
# they're excluded. Cargo.lock holds dependency checksums, also pure noise.
[files]
extend-exclude = [
  "**/test_vectors*.rs",
  "Cargo.lock",
  # Generated by release-plz from commit subjects — a "fix typo X -> Y" commit
  # necessarily names the misspelling, which would trip the gate on every release.
  "CHANGELOG.md",
  # Generated from keripy by tools/keripy-sync — carries keripy's prose verbatim.
  "docs/keripy-parity/**",
]

# KERI/CESR domain terms and short base64 fragments that the dictionary
# mistakes for typos. `ba` is the KERI backer-additions field; `IDentifier`
# is the canonical spelling in the SAID acronym; `iz` is a base64 substring.
[default.extend-words]
ba = "ba"
iz = "iz"
dentifier = "dentifier"
