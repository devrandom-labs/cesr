# typos spell-checker config. The test-vector files are opaque base64/CESR
# encodings — random-looking substrings trip the dictionary with no signal — so
# they're excluded. Cargo.lock holds dependency checksums, also pure noise.
[files]
extend-exclude = [
  "**/test_vectors*.rs",
  "Cargo.lock",
  # Generated by release-plz from commit subjects — a "fix typo X -> Y" commit
  # necessarily names the misspelling, which would trip the gate on every release.
  "CHANGELOG.md",
  # Generated from keripy by tools/keripy-sync — carries keripy's prose verbatim.
  "docs/keripy-parity/**",
  # Generated from keripy by scripts/keripy_diff_gen.py — opaque qb64/qb2 vectors.
  # `**/`-anchored: the gate runs `typos <abs-store-path>`, where non-`**` globs
  # match relative to CWD and silently miss.
  "**/corpus/keripy/**",
  # Generated from keripy by scripts/keripy_{keystate,events}_gen.py — opaque
  # qb64 keys/signatures (keystate.jsonl, kels.jsonl). Crate-agnostic glob: the
  # #192 split moved these from keri/tests to keri-codec/tests, so anchor on
  # `tests/corpus` rather than any one crate.
  "**/tests/corpus/**",
  # Generated from keripy by scripts/keripy_spine_gen.py — raw signed CESR
  # streams (event JSON + qb64 signature attachments), opaque to spelling.
  # Crate-agnostic for the same reason (now under keri-codec/tests/fixtures).
  "**/tests/fixtures/**",
]

# KERI/CESR domain terms and short base64 fragments that the dictionary
# mistakes for typos. `ba` is the KERI backer-additions field; `IDentifier`
# is the canonical spelling in the SAID acronym; `iz` is a base64 substring.
[default.extend-words]
ba = "ba"
iz = "iz"
dentifier = "dentifier"
# `UnparseablePrimitive` is the chosen SerderError variant name; "unparseable"
# is a valid English spelling the default dictionary would "correct" to
# "unparsable". Keep the deliberate spelling used across code, spec, and plan.
unparseable = "unparseable"
# "mis-sized" is a valid hyphenated compound (incorrectly sized); typos splits
# on the hyphen and flags the "mis" fragment alone as a typo of miss/mist.
mis = "mis"
# `ser` is keripy's serialization keyword argument (`Diger(ser=...)`) referenced
# verbatim in the keystate design doc and the keripy diff-gen script.
ser = "ser"
# `EDE` is a base64 fragment of the qb64 next-key digest fixture
# (`EDE4mexiupK…`, from the keystate corpus) that keripy_parity_gen.py reuses
# verbatim so the said_codes vectors tie back to the same key material.
ede = "ede"
# `tru` is a deliberately truncated JSON `true` literal in the opaque-seal
# scanner's differential proptest fragments (serialize.rs) — the point of the
# fragment is that it is NOT the word "true".
tru = "tru"
# `DAA` is a 3-B64-char genus-version example (major=3, minor=0: 3 << 12 =
# 12288) in the #208 typed-ParseError plan doc, not a typo of DATA.
daa = "daa"
