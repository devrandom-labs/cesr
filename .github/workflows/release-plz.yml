name: Release

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main

jobs:
  release-plz:
    name: Release
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Single invocation: opens/updates the release PR AND, when a release
      # commit lands, cuts the version + changelog, tags, creates the GitHub
      # release, and publishes `cesr-rs` to crates.io. No cargo-hakari step —
      # cesr is a single crate, unlike the nexus workspace this is modeled on.
      # Auth is the CARGO_REGISTRY_TOKEN repo secret (same model as nexus).
      - name: Run release-plz
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
