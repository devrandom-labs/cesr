# keripy-diff — nightly behavioral-parity check vs keripy.
#
# Regenerates the differential-test corpus from a PINNED keripy checkout and
# runs the in-crate diff harness against it. Unlike keripy-sync (which tracks
# the latest tag for code-table coverage), differential testing needs a FIXED
# oracle so a byte disagreement is unambiguous. A change to the regenerated
# corpus, or a harness failure, opens a PR for human review.
name: keripy-diff

on:
  schedule:
    # Nightly, 04:23 UTC (off-peak; fixed time for reproducibility).
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keripy-diff
  cancel-in-progress: false

jobs:
  diff:
    name: Differential parity vs keripy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cesr
        uses: actions/checkout@v4

      # The pinned keripy oracle commit lives in scripts/KERIPY_PIN (single source
      # of truth). Bump deliberately, in lockstep with the corpus.
      - name: Resolve keripy pin
        run: |
          ref="$(cat scripts/KERIPY_PIN)"
          if [ "$(wc -l < scripts/KERIPY_PIN)" -ne 1 ] \
            || ! printf '%s' "$ref" | grep -qxE '[0-9a-f]{40}'; then
            echo "malformed scripts/KERIPY_PIN: expected exactly one 40-char lowercase hex commit sha line" >&2
            exit 1
          fi
          echo "KERIPY_REF=$ref" >> "$GITHUB_ENV"

      - name: Clone keripy at the pinned commit
        run: |
          git init /tmp/keripy
          git -C /tmp/keripy remote add origin https://github.com/WebOfTrust/keripy
          git -C /tmp/keripy fetch --depth 1 origin "${KERIPY_REF}"
          git -C /tmp/keripy checkout FETCH_HEAD

      # keripy at the pin requires Python >= 3.14.0.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # pysodium (a keripy dep) dlopen's the native libsodium shared library.
      - name: Install libsodium
        run: sudo apt-get update && sudo apt-get install -y libsodium23

      - name: Install keripy
        run: python -m pip install -e /tmp/keripy

      - name: Regenerate corpus
        run: |
          python scripts/keripy_diff_gen.py --keripy /tmp/keripy --out cesr/tests/corpus/keripy
          python scripts/keripy_parity_gen.py --keripy /tmp/keripy --out cesr/tests/corpus/keripy/parity
          git --no-pager diff --stat -- cesr/tests/corpus/keripy || true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Run differential harness against the fresh corpus
        run: nix develop --command cargo test --all-features keripy -- --nocapture

      # An App-authored PR (vs the default GITHUB_TOKEN) lets the required
      # `Nix Flake Check` run on it, and sign-commits satisfies the signed-commits
      # branch rule. Reuses the release-plz App (as keripy-sync does).
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}

      - name: Open/update corpus-drift PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: keripy-diff/corpus
          base: main
          sign-commits: true
          commit-message: "test(diff): refresh keripy differential corpus"
          title: "test(diff): keripy differential corpus refresh"
          body: |
            Nightly **keripy-diff** regenerated the corpus from keripy `${{ env.KERIPY_REF }}`.

            Covers the primitive differential corpus AND the parity families
            (`parity/codex.jsonl`, `parity/formulas.jsonl`,
            `parity/validation.jsonl`): a new codex entry, a changed formula
            row, or a new validation rule at the pin lands here as a visible
            diff, not silent rot.

            A non-empty diff means keripy's output moved or the generator surfaced
            new coverage — review the vector delta before merging. If the harness
            step failed, a real cesr↔keripy disagreement exists: do **not** merge;
            file a bug and fix cesr (or `#[ignore]` the case with a tracking issue).
          labels: keripy-diff
          delete-branch: false
